name: iOS Build

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Install CocoaPods
        run: |
          cd ios
          pod install
          cd ..

      - name: Build iOS IPA
        run: flutter build ios --release --no-codesign
        # Lưu ý: --no-codesign sẽ build ra app nhưng chưa cài được ngay. 
        # Để cài được, chúng ta sẽ cần bước ký tên tiếp theo.

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-build
          path: build/ios/iphoneos/*.app
          # Chúng ta sẽ thu thập file .app hoặc .ipa ở đây
